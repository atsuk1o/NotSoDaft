<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Review - NotSoDaft</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">NotSoDaft</a>
        <span class="navbar-text text-warning fw-bold">Admin Panel</span>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm">Back</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Edit Review</h4>
                    <form th:action="@{/admin/reviews/{id}/edit(id=${review.id})}" method="post"
                          onsubmit="return confirm('Save changes to this review?')">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Eircode</label>
                            <input type="text" name="eircode" class="form-control"
                                   th:value="${review.eircode}" required/>
                        </div>

                        <input type="hidden" name="lat" id="latInput" th:value="${review.lat}"/>
                        <input type="hidden" name="lng" id="lngInput" th:value="${review.lng}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Address</label>
                            <div class="d-flex gap-2">
                                <input type="text" name="address" id="addressInput" class="form-control"
                                       th:value="${review.address}" required/>
                                <button type="button" class="btn btn-outline-success" onclick="lookupAddress()">
                                    Find
                                </button>
                            </div>
                        </div>

                        <div id="miniMapContainer" class="mb-3"
                             th:style="${review.lat != 0} ? 'display:block' : 'display:none'">
                            <label class="form-label fw-semibold small text-success">📍 Current location:</label>
                            <div id="miniMap" style="height: 200px; border-radius: 8px; border: 2px solid #198754;"></div>
                            <div class="form-text text-success" id="locationFound"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Review Text</label>
                            <textarea name="reviewText" class="form-control" rows="6"
                                      th:text="${review.reviewText}" required></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success w-100">Save Changes</button>
                            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary w-100">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
let miniMap = null;
let miniMarker = null;
const initLat = /*[[${review.lat}]]*/ 53.1424;
const initLng = /*[[${review.lng}]]*/ -7.6921;

window.addEventListener('load', () => {
    if (initLat && initLat !== 0) {
        initMap(initLat, initLng);
    }
});

function initMap(lat, lng) {
    if (!miniMap) {
        miniMap = L.map('miniMap').setView([lat, lng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);
        miniMarker = L.marker([lat, lng]).addTo(miniMap);
    } else {
        miniMap.setView([lat, lng], 16);
        miniMarker.setLatLng([lat, lng]);
    }
    setTimeout(() => miniMap.invalidateSize(), 100);
}

function lookupAddress() {
    const address = document.getElementById('addressInput').value.trim();
    if (!address) return;

    const query = encodeURIComponent(address + ', Ireland');
    fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1&countrycodes=ie`)
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) {
                alert('Address not found.');
                return;
            }
            const lat = parseFloat(data[0].lat);
            const lng = parseFloat(data[0].lon);

            document.getElementById('latInput').value = lat;
            document.getElementById('lngInput').value = lng;
            document.getElementById('locationFound').textContent = data[0].display_name;
            document.getElementById('miniMapContainer').style.display = 'block';
            initMap(lat, lng);
        })
        .catch(() => alert('Error looking up address.'));
}
</script>
</body>
</html>
