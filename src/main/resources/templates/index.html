<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head th:replace="~{fragments :: head('Main')}"></head>
    <body>

    <nav th:replace="~{fragments :: navbar}"></nav>
    <div class="bg-white border-bottom px-3 py-2">
        <form method="get" th:action="@{/}" class="d-flex gap-2 flex-wrap align-items-end">
            <div>
                <label class="form-label small mb-1 fw-semibold">Search</label>
                <input type="text" name="search" class="form-control form-control-sm" th:value="${search}"
                    placeholder="Address or Eircode..." style="width:200px;"/>
            </div>
            <div>
                <label class="form-label small mb-1 fw-semibold">County</label>
                <select name="county" class="form-select form-select-sm" style="width:150px;">
                    <option value="">All Counties</option>
                    <option value="Carlow" th:selected="${county == 'Carlow'}">Carlow</option>
                    <option value="Cavan" th:selected="${county == 'Cavan'}">Cavan</option>
                    <option value="Clare" th:selected="${county == 'Clare'}">Clare</option>
                    <option value="Cork" th:selected="${county == 'Cork'}">Cork</option>
                    <option value="Donegal" th:selected="${county == 'Donegal'}">Donegal</option>
                    <option value="Dublin" th:selected="${county == 'Dublin'}">Dublin</option>
                    <option value="Galway" th:selected="${county == 'Galway'}">Galway</option>
                    <option value="Kerry" th:selected="${county == 'Kerry'}">Kerry</option>
                    <option value="Kildare" th:selected="${county == 'Kildare'}">Kildare</option>
                    <option value="Kilkenny" th:selected="${county == 'Kilkenny'}">Kilkenny</option>
                    <option value="Laois" th:selected="${county == 'Laois'}">Laois</option>
                    <option value="Leitrim" th:selected="${county == 'Leitrim'}">Leitrim</option>
                    <option value="Limerick" th:selected="${county == 'Limerick'}">Limerick</option>
                    <option value="Longford" th:selected="${county == 'Longford'}">Longford</option>
                    <option value="Louth" th:selected="${county == 'Louth'}">Louth</option>
                    <option value="Mayo" th:selected="${county == 'Mayo'}">Mayo</option>
                    <option value="Meath" th:selected="${county == 'Meath'}">Meath</option>
                    <option value="Monaghan" th:selected="${county == 'Monaghan'}">Monaghan</option>
                    <option value="Offaly" th:selected="${county == 'Offaly'}">Offaly</option>
                    <option value="Roscommon" th:selected="${county == 'Roscommon'}">Roscommon</option>
                    <option value="Sligo" th:selected="${county == 'Sligo'}">Sligo</option>
                    <option value="Tipperary" th:selected="${county == 'Tipperary'}">Tipperary</option>
                    <option value="Waterford" th:selected="${county == 'Waterford'}">Waterford</option>
                    <option value="Westmeath" th:selected="${county == 'Westmeath'}">Westmeath</option>
                    <option value="Wexford" th:selected="${county == 'Wexford'}">Wexford</option>
                    <option value="Wicklow" th:selected="${county == 'Wicklow'}">Wicklow</option>
                </select>
            </div>
            <div>
                <label class="form-label small mb-1 fw-semibold">Property Type</label>
                <select name="propertyType" class="form-select form-select-sm" style="width:150px;">
                    <option value="">All Types</option>
                    <option value="STUDIO" th:selected="${propertyType?.name() == 'STUDIO'}">Studio</option>
                    <option value="ONE_BED" th:selected="${propertyType?.name() == 'ONE_BED'}">1 Bedroom</option>
                    <option value="TWO_BED" th:selected="${propertyType?.name() == 'TWO_BED'}">2 Bedrooms</option>
                    <option value="THREE_PLUS" th:selected="${propertyType?.name() == 'THREE_PLUS'}">3+ Bedrooms</option>
                </select>
            </div>
            <div>
                <button type="submit" class="btn btn-success btn-sm">Filter</button>
                <a th:href="@{/}" class="btn btn-outline-secondary btn-sm ms-1">Reset</a>
            </div>
            <input type="hidden" name="view" id="viewInput" value="map"/>
        </form>
    </div>
    <div class="d-flex align-items-center px-3 py-2 border-bottom bg-light gap-2">
        <button class="btn btn-sm btn-dark" id="btnMap" onclick="switchView('map')">
            <i class="bi bi-map"></i> Map View
        </button>
        <button class="btn btn-sm btn-outline-dark" id="btnGrid" onclick="switchView('grid')">
            <i class="bi bi-grid"></i> Grid View
        </button>
        <span class="ms-auto small text-muted" id="resultLabel"></span>
    </div>

    <div id="mapView" style="height: calc(100vh - 100px);">
        <div id="map" style="height: 100%; width: 100%;"></div>
    </div>

    <div id="gridView" style="display: none; padding: 16px;">
        <div class="row g-3" id="propertyGrid"></div>
    </div>

    <div class="modal fade" id="propertyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const reviews = /*[[${reviewsJson}]]*/ '[]';
        const parsedReviews = JSON.parse(reviews);
        const currentView = /*[[${param.view != null ? param.view[0] : 'map'}]]*/ 'map';

        function confirmLogout(e) {
            e.preventDefault();
            if (confirm('Are you sure you want to log out?')) {
                window.location.href = '/logout';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:src="@{/js/main.js}"></script>
    </body>
</html>
