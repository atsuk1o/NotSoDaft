<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>My Reviews - NotSoDaft</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    </head>
    <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">NotSoDaft</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/reviews/submit}">+ Write Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="confirmLogout(event)">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="fw-bold mb-4">My Reviews</h4>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div th:if="${reviews.empty}" class="alert alert-info">
            You haven't submitted any reviews yet.
            <a th:href="@{/reviews/submit}" class="alert-link">Write your first review</a>
        </div>

        <div th:each="review : ${reviews}" class="card mb-3 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="fw-bold mb-1">
                            <i class="bi bi-geo-alt"></i>
                            <span th:text="${review.address}"></span>
                            <code class="ms-2" th:text="${review.eircode}"></code>
                        </h6>
                        <p class="text-muted small mb-2">
                            <span th:text="${review.county}"></span>
                            · <span th:text="${review.createdAt}"></span>
                        </p>
                    </div>
                    <span th:switch="${review.status.name()}">
                        <span th:case="'PENDING'" class="badge bg-warning text-dark">Pending</span>
                        <span th:case="'APPROVED'" class="badge bg-success">Approved</span>
                        <span th:case="'REJECTED'" class="badge bg-danger">Rejected</span>
                    </span>
                </div>

                <p class="mb-2" th:text="${review.reviewText}"></p>

                <div class="d-flex gap-3 small text-muted mb-2">
                    <span> <strong th:text="${review.dampnessScore}"></strong>/5</span>
                    <span> <strong th:text="${review.heatingScore}"></strong>/5</span>
                    <span> <strong th:text="${review.maintenanceScore}"></strong>/5</span>
                    <span> <strong th:text="${review.overallScore}"></strong>/5</span>
                </div>

                <div th:if="${review.proofFilePath != null}" class="mt-2">
                    <span class="small text-muted">Proof of residence:</span>
                    <a th:href="${review.proofFilePath}" target="_blank" class="btn btn-outline-secondary btn-sm ms-2">
                        <i class="bi bi-file-earmark"></i> View your document
                    </a>
                </div>

                <div th:if="${review.status.name() != 'APPROVED'}">
                    <a th:href="@{/reviews/{id}/edit(id=${review.id})}"
                    class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil"></i> Edit
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
    function confirmLogout(e){
        e.preventDefault();
        if (confirm('Are you sure you want to log out?')){
            window.location.href = '/logout';
        }
    }
    </script>
    </body>
</html>
