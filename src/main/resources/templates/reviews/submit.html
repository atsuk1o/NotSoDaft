<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Submit Review - NotSoDaft</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
    </head>
    <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">NotSoDaft</a>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1">Submit a Review</h4>
                        <p class="text-muted small mb-4">Your review will be checked by an admin before going live.</p>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                        <form th:action="@{/reviews/submit}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Eircode</label>
                                <input type="text" name="eircode" class="form-control"
                                    placeholder="e.g. D02 XY12" required
                                    oninput="validateEircode(this)"/>
                                <div class="form-text" id="eircodeHint">Format: A99 XXXX</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Address</label>
                                <input type="text" name="address" class="form-control"
                                    placeholder="e.g. 14 Grafton Street, Dublin 2" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">County</label>
                                <select name="county" class="form-select" required>
                                    <option value="">Select county...</option>
                                    <option>Dublin</option>
                                    <option>Cork</option>
                                    <option>Galway</option>
                                    <option>Limerick</option>
                                    <option>Waterford</option>
                                    <option>Kilkenny</option>
                                    <option>Wexford</option>
                                    <option>Kerry</option>
                                    <option>Clare</option>
                                    <option>Tipperary</option>
                                    <option>Meath</option>
                                    <option>Kildare</option>
                                    <option>Wicklow</option>
                                    <option>Louth</option>
                                    <option>Donegal</option>
                                    <option>Sligo</option>
                                    <option>Mayo</option>
                                    <option>Roscommon</option>
                                    <option>Longford</option>
                                    <option>Westmeath</option>
                                    <option>Offaly</option>
                                    <option>Laois</option>
                                    <option>Carlow</option>
                                    <option>Cavan</option>
                                    <option>Monaghan</option>
                                    <option>Leitrim</option>
                                </select>
                            </div>
                            <hr/>
                            <h6 class="fw-bold mb-3">Rate the Property</h6>
                            <div class="mb-3">
                                <label class="form-label">Dampness <span class="text-muted small">(1 = very damp, 5 = dry)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio"
                                                name="dampnessScore" th:value="${i}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Heating <span class="text-muted small">(1 = very cold, 5 = warm)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio"
                                                name="heatingScore" th:value="${i}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Maintenance <span class="text-muted small">(1 = terrible, 5 = excellent)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio"
                                                name="maintenanceScore" th:value="${i}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Overall <span class="text-muted small">(1 = terrible, 5 = excellent)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio"
                                                name="overallScore" th:value="${i}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>

                            <hr/>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Your Review</label>
                                <textarea name="reviewText" class="form-control" rows="5"
                                        placeholder="Describe your experience living here..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                Submit for Review
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    function validateEircode(input) {
        const pattern = /^[AC-FHKNPRTV-Y][0-9]{2}\s?[AC-FHKNPRTV-Y0-9]{4}$/i;
        const hint = document.getElementById('eircodeHint');
        if (pattern.test(input.value.trim())){
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            hint.textContent = 'Valid Eircode';
            hint.className = 'form-text text-success';
        }else{
            input.classList.remove('is-valid');
            input.classList.add('is-invalid');
            hint.textContent = 'Format: A99 XXXX (e.g. D02 XY12)';
            hint.className = 'form-text text-danger';
        }
    }
    </script>
    </body>
</html>
