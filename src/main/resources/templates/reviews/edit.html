<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments :: head('Edit Review')}"></head>
    <body class="bg-light">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1">Edit Review</h4>
                        <p class="text-muted small mb-4">After saving your review will be resubmitted for admin approval.</p>

                        <form th:action="@{/reviews/{id}/edit(id=${review.id})}" method="post"
                            onsubmit="return confirm('Save changes? Your review will be resubmitted for approval.')">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Eircode</label>
                                <input type="text" name="eircode" id="eircodeInput" class="form-control"
                                    th:value="${review.eircode}" required
                                    oninput="validateEircode(this)"/>
                                <div class="form-text" id="eircodeHint">Format: A99 XXXX</div>
                            </div>

                            <input type="hidden" name="lat" id="latInput" th:value="${review.lat}"/>
                            <input type="hidden" name="lng" id="lngInput" th:value="${review.lng}"/>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Address</label>
                                <div class="d-flex gap-2">
                                    <input type="text" name="address" id="addressInput" class="form-control"
                                        th:value="${review.address}" required/>
                                    <button type="button" class="btn btn-outline-success" onclick="lookupAddress()">
                                        Find
                                    </button>
                                </div>
                            </div>

                            <div id="miniMapContainer" class="mb-3"
                                th:style="${review.lat != 0} ? 'display:block' : 'display:none'">
                                <label class="form-label fw-semibold small text-success">📍 Current location:</label>
                                <div id="miniMap" style="height: 200px; border-radius: 8px; border: 2px solid #198754;"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">County</label>
                                <select id="countySelect" class="form-select" required>
                                    <option value="">Select county...</option>
                                    <option th:each="c : ${ {'Dublin','Cork','Galway','Limerick','Waterford','Kilkenny','Wexford','Kerry','Clare','Tipperary','Meath','Kildare','Wicklow','Louth','Donegal','Sligo','Mayo','Roscommon','Longford','Westmeath','Offaly','Laois','Carlow','Cavan','Monaghan','Leitrim'} }"
                                            th:value="${c}" th:text="${c}"
                                            th:selected="${c == review.county}">
                                    </option>
                                </select>
                                <input type="hidden" id="countyHidden" name="county" th:value="${review.county}"/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Property Type</label>
                                <select name="propertyType" class="form-select" required>
                                    <option value="">Select type...</option>
                                    <option value="STUDIO" th:selected="${review.propertyType?.name() == 'STUDIO'}">Studio</option>
                                    <option value="ONE_BED" th:selected="${review.propertyType?.name() == 'ONE_BED'}">1 Bedroom</option>
                                    <option value="TWO_BED" th:selected="${review.propertyType?.name() == 'TWO_BED'}">2 Bedrooms</option>
                                    <option value="THREE_PLUS" th:selected="${review.propertyType?.name() == 'THREE_PLUS'}">3+ Bedrooms</option>
                                </select>
                            </div>
                            <hr/>
                            <h6 class="fw-bold mb-3">Rate the Property</h6>

                            <div class="mb-3">
                                <label class="form-label">Dampness <span class="text-muted small">(1 = very damp, 5 = dry)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="dampnessScore"
                                                th:value="${i}" th:checked="${i == review.dampnessScore}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Heating <span class="text-muted small">(1 = very cold, 5 = warm)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="heatingScore"
                                                th:value="${i}" th:checked="${i == review.heatingScore}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Maintenance <span class="text-muted small">(1 = terrible, 5 = excellent)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="maintenanceScore"
                                                th:value="${i}" th:checked="${i == review.maintenanceScore}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Overall <span class="text-muted small">(1 = terrible, 5 = excellent)</span></label>
                                <div class="d-flex gap-2">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="overallScore"
                                                th:value="${i}" th:checked="${i == review.overallScore}" required/>
                                            <label class="form-check-label" th:text="${i}"></label>
                                        </div>
                                    </th:block>
                                </div>
                            </div>

                            <hr/>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Your Review</label>
                                <textarea name="reviewText" class="form-control" rows="5"
                                        th:text="${review.reviewText}" required></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success w-100">Save & Resubmit</button>
                                <a th:href="@{/reviews/my}" class="btn btn-outline-secondary w-100">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
    let miniMap = null;
    let miniMarker = null;
    const initLat = /*[[${review.lat}]]*/ 0;
    const initLng = /*[[${review.lng}]]*/ 0;

    window.addEventListener('load', () => {
        if (initLat && initLat !== 0) {
            initMap(initLat, initLng);
        }
    });

    function initMap(lat, lng){
        if (!miniMap){
            miniMap = L.map('miniMap').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);
            miniMarker = L.marker([lat, lng]).addTo(miniMap);
        } else {
            miniMap.setView([lat, lng], 16);
            miniMarker.setLatLng([lat, lng]);
        }
        setTimeout(() => miniMap.invalidateSize(), 100);
    }

    function validateEircode(input){
        const pattern = /^[AC-FHKNPRTV-Y][0-9]{2}\s?[AC-FHKNPRTV-Y0-9]{4}$/i;
        const hint = document.getElementById('eircodeHint');
        if (pattern.test(input.value.trim())){
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            hint.textContent = 'Valid format';
            hint.className = 'form-text text-success';
        } else {
            input.classList.remove('is-valid');
            input.classList.add('is-invalid');
            hint.textContent = 'Format: A99 XXXX (e.g. D02 XY12)';
            hint.className = 'form-text text-danger';
        }
    }

    function lookupAddress(){
        const address = document.getElementById('addressInput').value.trim();
        if (!address) return;

        const query = encodeURIComponent(address + ', Ireland');
        fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1&addressdetails=1&countrycodes=ie&accept-language=en`)
            .then(res => res.json())
            .then(data => {
                if (data.length === 0){ alert('Address not found.'); return; }
                const lat = parseFloat(data[0].lat);
                const lng = parseFloat(data[0].lon);

                document.getElementById('latInput').value = lat;
                document.getElementById('lngInput').value = lng;
                document.getElementById('miniMapContainer').style.display = 'block';
                initMap(lat, lng);
            })
            .catch(() => alert('Error looking up address.'));
    }

    document.getElementById('eircodeInput').addEventListener('input', function(){
        if (document.getElementById('latInput').value){
            document.getElementById('latInput').value = '';
            document.getElementById('lngInput').value = '';
            document.getElementById('miniMapContainer').style.display = 'none';
        }
    });

    document.getElementById('countySelect').addEventListener('change', function(){
        document.getElementById('countyHidden').value = this.value;
    });
    </script>
    </body>
</html>
