<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head th:replace="~{fragments :: head('Forgot Password')}"></head>
    <body class="bg-light">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1">Forgot Password</h4>
                        <p class="text-muted small mb-4">Enter your email and we'll send you a reset link.</p>

                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control"
                                    placeholder="you@email.com" required/>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Send Reset Link</button>
                        </form>
                        <p class="text-center mt-3 mb-0 small">
                            <a th:href="@{/login}">Back to Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments :: modals}"></div>
    <div th:replace="~{fragments :: scripts}"></div>
    </body>
</html>
