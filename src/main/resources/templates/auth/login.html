<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-center fw-bold">Sign In</h4>

                    <div th:if="${param.registered}" class="alert alert-success">
                        Account createds! Please log in.
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger">
                        Invalid email or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        You have been logged out.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="username" class="form-control" placeholder="youremail@domain.com" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Sign In</button>
                    </form>

                    <p class="text-center mt-3 mb-0 small">
                        No account? <a th:href="@{/register}">Register here</a> ·
                        <a th:href="@{/forgot-password}">Forgot password?</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
