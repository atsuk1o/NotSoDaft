<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Reset Password')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Reset Password</h4>

                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:if="${token != null}" th:action="@{/reset-password}" method="post">
                        <input type="hidden" name="token" th:value="${token}"/>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Min 8 characters" required minlength="8"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control"
                                   placeholder="Repeat password" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Reset Password</button>
                    </form>

                    <p class="text-center mt-3 mb-0 small">
                        <a th:href="@{/login}">Back to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments :: modals}"></div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
