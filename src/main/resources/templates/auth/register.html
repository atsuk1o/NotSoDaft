<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Register')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-center fw-bold">Create Account</h4>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Name Surname" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="youremail@domain.com" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Create Account</button>
                    </form>

                    <p class="text-center mt-3 mb-0 small">
                        Already have an account? <a th:href="@{/login}">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
